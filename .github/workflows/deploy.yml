name: Deploy to GitHub Pages

# Builds the PWA and publishes it to GitHub Pages on every push to main, so it is
# installable on a phone over HTTPS. One-time setup: repo Settings → Pages →
# Source: "GitHub Actions". VITE_BASE is set to /<repo>/ so asset + router paths
# work under a project page; index.html is copied to 404.html for SPA deep links.
# VITE_ROUTING_REPO (and optional VITE_ROUTING_BRANCH) come from repo Actions
# variables (Settings → Secrets and variables → Actions → Variables) so the hosted
# build knows the private routing repo to exchange captures with Claude.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: VITE_BASE="/${{ github.event.repository.name }}/" VITE_ROUTING_REPO="${{ vars.VITE_ROUTING_REPO }}" VITE_ROUTING_BRANCH="${{ vars.VITE_ROUTING_BRANCH }}" npm run build
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
